<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="images/favicon.png" rel="icon" />
  <title>General Invoice - PageCapture</title>

  <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>

<body>
  <div class="max-w-7xl mx-auto">
    <header class="flex justify-between px-10 py-5">
      <!-- svg image here -->
      <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl flex items-end">Invoice
      </h1>
    </header>

    <hr>

    <section class="flex justify-between px-10 py-5">
      <p class="text-xs">
        <strong>Date:</strong>
        {{date}}
      </p>

      <p class="text-xs">
        <strong>Invoice No:</strong>
        {{invoiceNo}}
      </p>
    </section>

    <hr>

    <section class="flex justify-between px-10 py-5">
      <p class="text-xs">
        <strong>Invoiced To:</strong><br>
        {{addressLine1}}<br>
        {{addressLine2}}<br>
        {{city}}, {{state}}<br>
        {{postalCode}}
      </p>

      <p class="text-xs text-right">
        <strong>Pay To:</strong><br>
        Elow Development<br>
        peter@elowdevelopment.com
      </p>
    </section>

    <section class="px-10 py-5">
      <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded-lg">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Service
              </th>
              <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                Description
              </th>
              <th scope="col"
                class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider text-right">
                Rate
              </th>
              <th scope="col"
                class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider text-right">
                QTY
              </th>
              <th scope="col"
                class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider text-right">
                Amount
              </th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</body>

</html>
